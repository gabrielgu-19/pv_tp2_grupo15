<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/ejercicio21.css">
    <title>Ejercicio 21</title>
</head>
<body>
    <header>
        <h1>Ejercicio 21</h1>
        <p>Seleccione un país y su capital correspondiente</p>
    </header>
    <main>
        <label for="paises">Países</label>
        <select name="paises" id="paises">
            <option value="Argentina">Argentina</option>
            <option value="Brasil">Brasil</option>
            <option value="Ecuador">Ecuador</option>
            <option value="Peru">Perú</option>
            <option value="Paraguay">Paraguay</option>
            <option value="Chile">Chile</option>
        </select>
        <label for="capitales">Capitales</label>
        <select name="capitales" id="capitales">
            <option value="Buenos Aires">Buenos Aires</option>
            <option value="Brasilia">Brasilia</option>
            <option value="Quito">Quito</option>
            <option value="Lima">Lima</option>
            <option value="Asuncion">Asuncion</option>
            <option value="Santiago de Chile">Santiago de Chile</option>
        </select>
    </main>
    <footer>
        <p>&copy; 2026 Programacion Visual.</p>
    </footer>
    <script type="module" src="js/ejercicio21.js"></script>
</body>
</html>
