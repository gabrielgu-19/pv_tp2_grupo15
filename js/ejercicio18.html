<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 18</title>
</head>
<body>
    <script>
        const calcularMayor = (numero1, numero2) => {
            if(numero1 > numero2){
                document.write(`El numero ${numero1} es mayor que ${numero2}.`);
            }else if(numero1 < numero2){
                document.write(`El numero ${numero2} es mayor que ${numero1}.`);
            }else{
                document.write(`Los numeros ${numero1} y ${numero2} son iguales.`);
            }
        };
        const num1 = Number(prompt("Ingrese el primer numero: "));
        const num2 = Number(prompt("Ingrese el segundo numero: "));
        calcularMayor(num1, num2);
        
    </script>
</body>
</html>
