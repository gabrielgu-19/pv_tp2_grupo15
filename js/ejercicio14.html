<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 14</title>
</head>

<body>
    <script>
       const duplicar = (arr) => arr.map(num => num * 2);

        const cantidad = parseInt(prompt("¿Cuántos números desea ingresar en el arreglo?"));

        const numeros = [];
      
        for (let i = 0; i < cantidad; i++) {
            const num = parseInt(prompt(`Ingrese el número ${i + 1}:`));
            numeros.push(num);
        }
        const duplicados = duplicar(numeros);

        document.write("<h3>Arreglo original:</h3>");
        document.write(numeros.join(", ") + "<br>");
        document.write("<h3>Arreglo duplicado:</h3>");
        document.write(duplicados.join(", "));
    </script>
</body>
</html>
