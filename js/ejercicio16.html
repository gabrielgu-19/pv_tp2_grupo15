<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 16</title>
</head>
<body>
    <script>
        const sumarRango = (inicio, final) => {
            let suma = 0;
            for(let i = inicio; i <= final; i++){
                suma += i;
            }
            return suma;
        };
        document.write("Suma de los numeros en el rango especificado: ");
        document.write(sumarRango(3, 8));
    </script>
</body>
</html>
