<!DOCTYPE html>
<html lang="es">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <script>
        const kilometros = Number(prompt("Ingrese la cantidad de kilometros: "));
        const combustible = Number(prompt("Ingrese la cantidad de combustible consumido (en litros): "));
        document.write(`Consumo de combustible: ${combustible / kilometros} litros por kilometro.`);
    </script>
</body>
