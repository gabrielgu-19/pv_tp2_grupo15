<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 17</title>
</head>
<body>
    <script>
        const contarLetraA = cadena => {
            let contador = 0;
            for(let i = 0; i < cadena.length; i++){
                if(cadena[i] === "a"){
                    contador++;
                }
            }
            return contador;
        };

        document.write(`La cantidad de "a" en la cadena: "candado" es de: ${contarLetraA("candado")}`);
    </script>
</body>
</html>
